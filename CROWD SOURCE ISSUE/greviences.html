<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAMADHAAN - Enter Grievance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="topbar">
            <span>ISSUED IN PUBLIC INTEREST FOR THE CITIZENS OF BHARAT <br> by the people of BHARAT</span>
            <div class="menu-links">
                <a href="index.html">Home</a>
                <a href="contact.html">Contact Us</a>
                <a href="aboutus.html">About Us</a>
                <a href="#">FAQs/Help</a>
                <a href="#">Site Map</a>
            </div>
        </div>
        <div class="main-header">
            <img src="Screenshot 2025-09-13 020811.png" alt="Emblem" class="emblem">
            <p id="title" class="TITLECARD" style="text-align:center;">SAMADHAAN</p>
        </div>
        <nav>
            <div class="nav-btn-group">
               
                <div class="nav-right-group">
                    <span class="language-label">Language :</span>
                    <select id="languageSelect">
                        <option value="en">English</option>
                        <option value="hi">हिन्दी</option>
                    </select>
                </div>
                <button id="signInBtn" class="signbtn">Sign In</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="grievance-form-container">
            <div class="grievance-form-title">Enter Your Grievance</div>
            <form class="grievance-form" enctype="multipart/form-data" method="post" action="connect-samaadhan.php">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required autocomplete="name" placeholder="Enter your name">

                <label for="authority">Concerned Authorities</label>
                <input type="text" id="authority" name="authority" required placeholder="Enter authority name or department">

                <label for="address">Address</label>
                <input type="text" id="address" name="address" required autocomplete="street-address" placeholder="Enter address">

                <label for="issue">Issue Description</label>
                <textarea id="issue" name="issue" required placeholder="Describe the issue"></textarea>

                <label for="numPeople">No. of People Affected</label>
                <select id="numPeople" name="numPeople" required>
                    <option value="">Select number</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11+">11 or more</option>
                </select>

                <label for="proof">Problem Proof (Photo/Video)</label>
                <input type="file" id="proof" name="proof" accept="image/*,video/*" required>

                <button type="submit" class="submit-btn">Submit Grievance</button>
            </form>
        </div>
    </main>

    <footer>
        <span></span>
    </footer>
</body>
</html>
